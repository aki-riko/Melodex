name: Android CI

on:
  pull_request:
    branches: [master]
    paths:
      - "android/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - ".github/workflows/android-*.yml"
  push:
    branches: [master]
    paths:
      - "android/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - ".github/workflows/android-*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: microsoft
          java-version: "21"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install Capacitor dependencies
        run: npm ci

      - name: Verify release version rules
        run: npm run test:android-version

      - name: Sync Capacitor assets
        run: npm run cap:copy

      - name: Test, lint and build Debug APK
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android --no-daemon testDebugUnitTest lintDebug assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Melodex-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
