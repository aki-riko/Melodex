name: Desktop Lyrics CI

on:
  pull_request:
    branches: [master]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-lyrics-ci.yml"
  push:
    branches: [master]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-lyrics-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-lyrics-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    defaults:
      run:
        working-directory: desktop/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Prepare Rust toolchain
        run: |
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --check

      - name: Test Rust core
        run: cargo test --locked

      - name: Lint all targets
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build native helper
        run: cargo build --locked

      - name: Test lyrics UI core
        working-directory: desktop/ui
        run: node lyricsCore.test.mjs
