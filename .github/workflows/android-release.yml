name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: signed-release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: android-release
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: microsoft
          java-version: "21"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Resolve tag version
        id: version
        run: node android/scripts/resolve-release-version.mjs "$GITHUB_REF_NAME"

      - name: Install Capacitor dependencies
        run: npm ci

      - name: Verify release version rules
        run: npm run test:android-version

      - name: Sync Capacitor assets
        run: npm run cap:copy

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done
          keystore="$RUNNER_TEMP/melodex-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          chmod 600 "$keystore"
          echo "ANDROID_KEYSTORE_FILE=$keystore" >> "$GITHUB_ENV"

      - name: Test, lint and build signed Release APK
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android --no-daemon \
            testDebugUnitTest \
            lintDebug \
            assembleRelease \
            -PmelodexVersionName=${{ steps.version.outputs.version_name }} \
            -PmelodexVersionCode=${{ steps.version.outputs.version_code }}

      - name: Verify and name Release APK
        id: artifact
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          build_tools="$ANDROID_SDK_ROOT/build-tools/36.0.0"
          source_apk="android/app/build/outputs/apk/release/app-release.apk"
          mkdir -p dist
          apk="dist/Melodex-v${VERSION_NAME}-universal.apk"
          cp "$source_apk" "$apk"
          "$build_tools/apksigner" verify --verbose --print-certs "$apk"
          badging="$("$build_tools/aapt" dump badging "$apk")"
          grep -F "package: name='life.nineli.melodex' versionCode='${VERSION_CODE}' versionName='${VERSION_NAME}'" <<< "$badging"
          grep -F "sdkVersion:'26'" <<< "$badging"
          grep -F "targetSdkVersion:'36'" <<< "$badging"
          (cd dist && sha256sum "$(basename "$apk")" > "$(basename "$apk").sha256")
          echo "apk_path=$apk" >> "$GITHUB_OUTPUT"
          echo "sha_path=$apk.sha256" >> "$GITHUB_OUTPUT"

      - name: Attest APK provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: ${{ steps.artifact.outputs.apk_path }}

      - name: Upload signed Release Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Melodex-${{ github.ref_name }}-signed
          path: |
            ${{ steps.artifact.outputs.apk_path }}
            ${{ steps.artifact.outputs.sha_path }}
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          APK_PATH: ${{ steps.artifact.outputs.apk_path }}
          SHA_PATH: ${{ steps.artifact.outputs.sha_path }}
        run: |
          flags=(--verify-tag --generate-notes --title "Melodex $GITHUB_REF_NAME")
          if [ "$PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$APK_PATH" "$SHA_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$APK_PATH" "$SHA_PATH" "${flags[@]}"
          fi

      - name: Remove temporary keystore
        if: always()
        run: rm -f "${ANDROID_KEYSTORE_FILE:-}"
