<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Neobrutalism 图标:橙底 + 黑粗边 + 音符 -->
  <rect x="20" y="20" width="472" height="472" rx="24" fill="#f97316" stroke="#000000" stroke-width="24"/>
  <!-- 硬阴影感:右下偏移的黑块通过描边体现,这里用音符主体 -->
  <g fill="#000000">
    <!-- 音符符干 -->
    <rect x="200" y="120" width="26" height="230"/>
    <rect x="330" y="100" width="26" height="230"/>
    <!-- 符梁(连接两符干)-->
    <path d="M200 120 L356 92 L356 150 L200 178 Z"/>
    <!-- 左符头 -->
    <ellipse cx="170" cy="352" rx="52" ry="40"/>
    <!-- 右符头 -->
    <ellipse cx="300" cy="332" rx="52" ry="40"/>
  </g>
  <!-- 白色高光描边让音符在橙底上更立体(粗野风硬边)-->
  <g fill="none" stroke="#ffffff" stroke-width="6" opacity="0.0"/>
</svg>
